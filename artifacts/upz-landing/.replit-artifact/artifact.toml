kind = "web"
previewPath = "/"
title = "Universal Productivity Zone"
version = "1.0.0"
id = "artifacts/upz-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23377

[services.development]
run = "pnpm --filter @workspace/upz-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/upz-landing", "run", "build" ]
publicDir = "artifacts/upz-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23377"
BASE_PATH = "/"
