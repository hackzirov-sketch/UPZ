<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180" fill="none" role="img" aria-label="Focus mode premium sticker">
  <title>Focus mode premium sticker</title>
  <defs>
    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#111827" flood-opacity="0.16"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="18" y="20" width="144" height="140" rx="36" fill="url(#bg)" filter="url(#softShadow)"/>
  <circle cx="54" cy="50" r="24" fill="white" opacity="0.16"/>
  <defs><linearGradient id="bg" x1="24" y1="20" x2="162" y2="160" gradientUnits="userSpaceOnUse"><stop stop-color="#0EA5E9"/><stop offset="1" stop-color="#6366F1"/></linearGradient></defs>
  <circle cx="90" cy="78" r="45" stroke="white" stroke-width="12" opacity="0.94"/><circle cx="90" cy="78" r="23" stroke="#E0F2FE" stroke-width="8"/><circle cx="90" cy="78" r="8" fill="white"/>
  <rect x="42" y="124" width="96" height="22" rx="11" fill="white" opacity="0.18"/>
  <text x="90" y="139" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="800" fill="white">FOCUS MODE</text>
</svg>