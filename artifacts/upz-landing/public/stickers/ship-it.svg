  <path d="M90 35c20 16 31 36 31 57 0 16-13 29-31 29S59 108 59 92c0-21 11-41 31-57Z" fill="white" opacity="0.94"/><circle cx="90" cy="76" r="16" fill="#DBEAFE"/><path d="M78 121l-11 20M102 121l11 20" stroke="#DBEAFE" stroke-width="8" stroke-linecap="round"/>
