services:
  - type: web
    name: upz
    runtime: static
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/upz-landing run build
    staticPublishPath: ./artifacts/upz-landing/dist/public
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: BASE_PATH
        value: /
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
